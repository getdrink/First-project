<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片网站</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
    }
    header {
      background: #3f51b5;
      color: #fff;
      padding: 20px 16px;
      text-align: center;
    }
    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 16px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      display: block;
    }
    .card .info {
      padding: 14px;
    }
    .card .info h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .card .info p {
      margin: 0;
      color: #666;
      line-height: 1.5;
    }
    footer {
      text-align: center;
      padding: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <header>
    <h1>图片网站</h1>
    <p>展示美丽图片的简单画廊</p>
  </header>
  <main class="container">
    <div class="gallery">
      <article class="card">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80" alt="山间风景">
        <div class="info">
          <h3>山间风景</h3>
          <p>宁静的山间风景，适合放松与沉思。</p>
        </div>
      </article>
      <article class="card">
        <img src="https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=800&q=80" alt="城市夜景">
        <div class="info">
          <h3>城市夜景</h3>
          <p>繁华都市的夜晚灯火辉煌。</p>
        </div>
      </article>
      <article class="card">
        <img src="https://images.unsplash.com/photo-1498550744926-53e91f8c0a1d?auto=format&fit=crop&w=800&q=80" alt="海边日出">
        <div class="info">
          <h3>海边日出</h3>
          <p>温暖的日出照亮海岸线。</p>
        </div>
      </article>
      <article class="card">
        <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=800&q=80" alt="森林小径">
        <div class="info">
          <h3>森林小径</h3>
          <p>绿意盎然的森林小径，令人心旷神怡。</p>
        </div>
      </article>
    </div>
  </main>
  <footer>
    <p>© 2026 图片网站</p>
  </footer>
</body>
</html>
